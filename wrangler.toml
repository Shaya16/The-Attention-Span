name = "the-attention-span"
compatibility_date = "2026-01-01"
pages_build_output_dir = "./dist"

# Replace database_id after running:
#   wrangler d1 create attention-span-db
# (or create via Cloudflare dashboard, then copy the UUID here)
[[d1_databases]]
binding = "DB"
database_name = "attention-span-db"
database_id = "3ee85f55-613f-404b-8862-8f298c19f03d"
migrations_dir = "migrations"

# Production env vars/secrets are set via dashboard or:
#   wrangler pages secret put ADMIN_PASSWORD
#   wrangler pages secret put SESSION_SECRET
#   wrangler pages secret put TURNSTILE_SECRET
# Local dev: copy `.dev.vars.example` -> `.dev.vars`
